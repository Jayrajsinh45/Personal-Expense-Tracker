name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: |
          npm install @capacitor/cli@5 @capacitor/core@5 @capacitor/android@5

      - name: Build Expo Web App
        run: npx expo export --platform web

      - name: Initialise and sync Capacitor
        run: |
          npx cap init PersonalExpenseTracker com.jayrajsinh45.personalexpensetracker --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          sed -i 's/gradle-8.0.2-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties || true
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
